# Builds the react-signals-playground explainer site and publishes it to
# GitHub Pages on every push to main.
#
# Toolchain, submodules, and workspace installs come from the shared
# .github/actions/site-deps composite action (also used by verify.yml's
# browser battery job).
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-flight deploy finish so the
# site never lands in a half-updated state.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CI: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - uses: ./.github/actions/site-deps

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build site
        working-directory: packages/react-signals-playground
        run: pnpm build --base "${{ steps.pages.outputs.base_path }}/"

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/react-signals-playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
