name: release

on:
  push:
    branches: [main]
    paths:
      - "packages/cosignals/**"
      - "packages/cosignals-arena/**"
      - "packages/devtools/**"
      - "packages/react-signals-playground/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/release.yml"
  pull_request:
    paths:
      - "packages/cosignals/**"
      - "packages/cosignals-arena/**"
      - "packages/devtools/**"
      - "packages/react-signals-playground/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  verify-and-pack:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'justjake')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The --full verification drives the playground site, whose stress
      # field and benchmarks import adapter source from the
      # reactivity-benchmark submodule; the composite installs toolchain,
      # submodules, and the site dependency graph.
      - uses: ./.github/actions/site-deps

      - name: Install react18 fixture dependencies
        run: >-
          pnpm install --frozen-lockfile
          --filter "react-signals-playground..."
          --filter "cosignals-react18-fixture"
          --filter "cosignals-arena-react18-fixture"

      - name: Test, build, and pack
        env:
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: >-
          pnpm run publish --
          --pack-only
          --full

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarballs-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/release-artifacts/
          if-no-files-found: error
          retention-days: 7

  verify-artifacts:
    needs: verify-and-pack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-tarballs-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/release-artifacts

      - name: Typecheck and smoke-test the packed artifacts
        run: >-
          pnpm run publish --
          --verify-only
          --work-directory "${{ runner.temp }}/release-consumer"

  publish:
    needs: verify-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-tarballs-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/release-artifacts

      - name: Publish the tested tarballs
        run: >-
          pnpm run publish --
          --publish-only
