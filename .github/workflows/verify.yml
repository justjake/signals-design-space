name: verify

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  inlining:
    name: inlining verification (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Init inlining source submodule
        run: git submodule update --init packages/dalien-signals vendor/alien-signals

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install inlining harness
        run: pnpm install --frozen-lockfile --filter "@lab/harness..."

      - name: Trace top-tier compilation, inlining, and steady deopts
        run: pnpm inlining

  react-unit:
    name: concurrent signals unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Init workspace source submodules
        run: git submodule update --init packages/dalien-signals vendor/alien-signals

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install React integration dependencies
        run: |
          pnpm install --frozen-lockfile \
            --filter "cosignals..." \
            --filter "cosignals-arena..."

      - name: Run package suites
        run: |
          pnpm --dir packages/cosignals test
          pnpm --dir packages/cosignals-arena test

  react-matrix:
    name: cosignals unit tests (React ${{ matrix.react }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Each entry pairs a react/react-dom release line with the scheduler
        # version that react-dom line depends on (npm view react-dom@X
        # dependencies). Keep the pairs in sync when bumping lines.
        include:
          - react: 19.0.7
            scheduler: 0.25.0
          - react: 19.1.8
            scheduler: 0.26.0
          - react: 19.2.7
            scheduler: 0.27.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Init workspace source submodules
        run: git submodule update --init packages/dalien-signals vendor/alien-signals

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install cosignals dependencies
        run: pnpm install --frozen-lockfile --filter "cosignals..."

      # Swap in the matrix React after the frozen-lockfile install; this
      # rewrites packages/cosignals/package.json and the lockfile in the
      # runner's checkout only, so no per-version lockfiles are committed.
      - name: Install React ${{ matrix.react }}
        run: |
          pnpm --filter cosignals add -D \
            react@${{ matrix.react }} \
            react-dom@${{ matrix.react }} \
            scheduler@${{ matrix.scheduler }}

      - name: Report installed React versions
        working-directory: packages/cosignals
        run: |
          node -p "['react', 'react-dom', 'scheduler'].map((m) => m + ' ' + require(m + '/package.json').version).join('\n')"

      - name: Run cosignals suite on React ${{ matrix.react }}
        run: pnpm --dir packages/cosignals test

  browser:
    name: browser battery (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Init workspace source submodules
        run: git submodule update --init packages/dalien-signals vendor/alien-signals

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install browser battery dependencies
        run: pnpm install --frozen-lockfile --filter "react-signals-playground..."

      - name: Install bundled Chromium
        working-directory: packages/react-signals-playground
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck browser battery
        working-directory: packages/react-signals-playground
        run: pnpm check

      - name: Run browser battery
        working-directory: packages/react-signals-playground
        run: pnpm battery

      - name: Upload browser diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-battery-${{ github.sha }}
          path: |
            packages/react-signals-playground/playwright-report/
            packages/react-signals-playground/battery/test-results/
          if-no-files-found: ignore
