# Benchmark the signal libraries as consumed by React, which the core
# benchmark in benchmark.yml cannot measure. packages/react-seam-bench runs
# node and jsdom scenarios for fan-out, transitions under load, and mounting.
# The results measure JavaScript work without browser paint.
#
# Every contender runs on the same React build: the patched fork in
# vendor/react. One React version for everyone is the fairness rule.
# The ~13s fork build is cached keyed on the vendor/react submodule SHA;
# the fork's own toolchain pins node 20 (vendor/react/.nvmrc), so cache
# misses build under node 20 and everything else runs under node 24.
#
# Design and rationale: research/react-seam-benchmark-proposal.md.

name: react-benchmark

on:
  push:
    branches: [main]
    paths:
      - 'packages/cosignals/**'
      - 'packages/react-seam-bench/**'
      - 'packages/cosignals-arena/**'
      - 'packages/dalien-signals'
      - 'daishi-concurrent-benchmark'
      - '.github/workflows/react-benchmark.yml'
  workflow_dispatch:
    inputs:
      contenders:
        description: 'Contender names (quoted, space-separated)'
        required: false
        default: '"cosignals" "alien-uses" "dalien-uses" "baseline-context" "baseline-local"'
      rounds:
        description: 'Interleaved rounds per contender'
        required: false
        default: '3'

concurrency:
  group: react-benchmark-${{ github.ref }}
  cancel-in-progress: true

env:
  CONTENDERS: ${{ inputs.contenders || '"cosignals" "alien-uses" "dalien-uses" "baseline-context" "baseline-local"' }}
  ROUNDS: ${{ inputs.rounds || '3' }}

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # Only the submodules this job needs — a full recursive init would
      # pull every vendor library.
      - name: Init submodules
        run: |
          git submodule update --init \
            packages/dalien-signals \
            upstream-alien-signals \
            vendor/react

      - name: Compute react fork cache key
        id: fork
        run: echo "sha=$(git -C vendor/react rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # fork/build-react.sh leaves the built packages (plus the node_modules
      # symlinks react-dom needs for resolution) under build/oss-experimental,
      # which is exactly what the root package.json link: overrides consume —
      # so that directory is the whole cache.
      - name: Restore react fork build
        id: fork-cache
        uses: actions/cache@v4
        with:
          path: vendor/react/build/oss-experimental
          key: react-fork-${{ runner.os }}-${{ steps.fork.outputs.sha }}

      - name: Set up node for the react fork build
        if: steps.fork-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: vendor/react/.nvmrc

      # The fork's rollup build runs out of vendor/react's own node_modules
      # (yarn 1, preinstalled on the runner), which build-react.sh assumes
      # is already populated.
      - name: Build react fork
        if: steps.fork-cache.outputs.cache-hit != 'true'
        run: |
          (cd vendor/react && yarn install --frozen-lockfile)
          bash fork/build-react.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install -g pnpm@10

      # Build linked packages before the root install materializes them.
      - name: Build upstream alien-signals (esm/ is a local build artifact)
        working-directory: upstream-alien-signals
        run: |
          npm install
          # A fresh install resolves a TS 7 without
          # getParsedCommandLineOfConfigFile, which the build script needs.
          npm install --no-save typescript@5.8
          npm run build

      - name: Build dalien-signals
        working-directory: packages/dalien-signals
        run: |
          pnpm install --ignore-workspace
          node build.js

      # After the react fork cache step and the linked packages' builds:
      # pnpm resolves the react overrides and materializes link: deps at
      # install time, so their build outputs must exist first.
      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      # cosignals exports TypeScript source directly; the
      # scenario bundler compiles them, so no separate build step.

      - name: Build react-seam-bench runner
        working-directory: packages/react-seam-bench
        run: pnpm build

      - name: Run scenarios
        working-directory: packages/react-seam-bench
        run: |
          echo "node dist/isolated.js --rounds $ROUNDS $CONTENDERS"
          echo "$CONTENDERS" | xargs node dist/isolated.js --rounds "$ROUNDS" > "$GITHUB_WORKSPACE/react-results.csv"
          cat "$GITHUB_WORKSPACE/react-results.csv"

      - name: Verify every requested contender produced results
        run: |
          missing=0
          eval "set -- $CONTENDERS"
          for c in "$@"; do
            if ! grep -q "^$c *," react-results.csv; then
              echo "::error::$c produced no benchmark rows (its child crashed in every round)"
              missing=1
            fi
          done
          exit "$missing"

      - name: Render chart PNG
        run: |
          node packages/react-seam-bench/src/chart.mjs \
            react-results.csv \
            react-benchmark.svg \
            "Total React-seam scenario time by contender" \
            "react-seam-bench (median of $ROUNDS interleaved isolated rounds), Node $(node --version), jsdom = JS cost only, GitHub Actions $(uname -m) - lower is better"
          HEIGHT=$(grep -o 'height="[0-9]*"' react-benchmark.svg | head -1 | grep -o '[0-9]*')
          google-chrome --headless=new --no-sandbox --disable-gpu \
            --screenshot=react-benchmark.png \
            --window-size=1080,"$HEIGHT" --force-device-scale-factor=2 \
            --default-background-color=FFFFFFFF \
            "file://$GITHUB_WORKSPACE/react-benchmark.svg"

      - name: Job summary
        run: |
          {
            echo "### React-seam benchmark totals (median of $ROUNDS rounds, jsdom = JS cost only)"
            echo ""
            echo '| contender | total (ms) |'
            echo '| --- | ---: |'
            awk -F',' 'NR>1 && $3+0>0 {gsub(/^ +| +$/,"",$1); t[$1]+=$3} END {for (c in t) printf "| %s | %d |\n", c, t[c]}' \
              react-results.csv | sort -t'|' -k3 -n
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: react-benchmark
          path: |
            react-results.csv
            react-benchmark.svg
            react-benchmark.png
          if-no-files-found: error
